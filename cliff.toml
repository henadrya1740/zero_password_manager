# ── git-cliff configuration ───────────────────────────────────────────────────
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to **Zero Password Manager** are documented in this file.\
 Versions follow [Semantic Versioning](https://semver.org/) and this file is\
 generated by [git-cliff](https://github.com/orhun/git-cliff).

"""

body = """
{% if version -%}
---

## 🏷️ {{ version | trim_start_matches(pat="v") }} &nbsp;·&nbsp; {{ timestamp | date(format="%d %B %Y") }}

{% else -%}
---

## 🔮 Unreleased

{% endif -%}

{%- set breaking = commits | filter(attribute="breaking", value=true) -%}
{%- if breaking | length > 0 %}
> ⚠️ **BREAKING CHANGES** — this release contains backwards-incompatible changes.

{% for commit in breaking -%}
> - **{{ commit.message | upper_first }}**
{% endfor %}
{% endif -%}

{%- for group, commits in commits | group_by(attribute="group") %}
### {{ group }}

{% for commit in commits -%}
- {% if commit.scope -%}**`{{ commit.scope }}`** — {% endif -%}
{{ commit.message | upper_first -}}
{% if commit.breaking %} ⚠️{% endif %}
{% endfor %}
{% endfor -%}
"""

footer = """

---
<sub>Generated by [git-cliff](https://github.com/orhun/git-cliff) 🦀 · \
[Keep a Changelog](https://keepachangelog.com/) format</sub>
"""

trim = true

# ── Git settings ──────────────────────────────────────────────────────────────

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
protect_breaking_commits = false
filter_commits = true

commit_parsers = [
  # ── Always show breaking-change commits regardless of type ──────────────────
  { breaking = true,               group = "💥 Breaking Changes"  },

  # ── Standard conventional-commit types ─────────────────────────────────────
  { message = "^feat",             group = "🚀 New Features"      },
  { message = "^fix",              group = "🐛 Bug Fixes"         },
  { message = "^security|^sec",    group = "🔒 Security"          },
  { message = "^refactor",         group = "♻️  Refactoring"       },
  { message = "^perf",             group = "⚡ Performance"        },
  { message = "^docs",             group = "📖 Documentation"     },
  { message = "^test",             group = "🧪 Tests"             },
  { message = "^style",            group = "🎨 Style & UX"        },
  { message = "^revert",           group = "⏪ Reverts"           },

  # ── Body-scoped security note ───────────────────────────────────────────────
  { body = ".*security",           group = "🔒 Security"          },

  # ── Release commits stay visible, other chore/ci are noise ─────────────────
  { message = "^chore\\(release\\)", skip = false                 },
  { message = "^chore",            skip = true                    },
  { message = "^ci",               skip = true                    },
]
