name: Release APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v0.2.1'

permissions:
  contents: write

jobs:
  build-release:
    name: Build & Release Android APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history required for git-cliff changelog
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Resolve version ───────────────────────────────────────────────────────
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          # Strip leading 'v' for pubspec / build-name
          NAME="${TAG#v}"
          echo "tag=${TAG}"   >> $GITHUB_OUTPUT
          echo "name=${NAME}" >> $GITHUB_OUTPUT
          echo "Resolved tag=${TAG}  name=${NAME}"

      # ── Toolchain ─────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # ── Keystore signing (optional) ───────────────────────────────────────────
      # Set these secrets in GitHub → Settings → Secrets → Actions:
      #   KEYSTORE_BASE64    base64-encoded .jks file  (base64 -w0 my.jks)
      #   KEYSTORE_PASSWORD  store password
      #   KEY_ALIAS          key alias inside the keystore
      #   KEY_PASSWORD       key password
      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/keystore.jks
          cat > android/key.properties << 'PROPS'
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          PROPS
          echo "Keystore decoded and key.properties written."

      # ── Bump version in pubspec.yaml ──────────────────────────────────────────
      - name: Update pubspec.yaml version
        run: |
          VERSION="${{ steps.ver.outputs.name }}"
          BUILD="${{ github.run_number }}"
          sed -i "s/^version: .*/version: ${VERSION}+${BUILD}/" pubspec.yaml
          echo "pubspec version → ${VERSION}+${BUILD}"

      # ── Build APK ─────────────────────────────────────────────────────────────
      - name: Build release APK
        run: |
          flutter build apk \
            --release \
            --dart-define=ENVIRONMENT=prod \
            --build-name="${{ steps.ver.outputs.name }}" \
            --build-number="${{ github.run_number }}"

      - name: Rename APK
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          cp build/app/outputs/flutter-apk/app-release.apk \
             "build/app/outputs/flutter-apk/zero-password-manager-${TAG}.apk"

      # ── Generate changelog ────────────────────────────────────────────────────
      - name: Install git-cliff
        run: |
          VERSION="2.4.0"
          ARCHIVE="git-cliff-${VERSION}-x86_64-unknown-linux-musl.tar.gz"
          wget -q "https://github.com/orhun/git-cliff/releases/download/v${VERSION}/${ARCHIVE}"
          tar -xzf "${ARCHIVE}"
          sudo mv "git-cliff-${VERSION}/git-cliff" /usr/local/bin/git-cliff
          git cliff --version

      - name: Generate release notes for this tag
        id: notes
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          NAME="${{ steps.ver.outputs.name }}"

          # ── Changelog section from git-cliff ──────────────────────────────
          git cliff \
            --config cliff.toml \
            --tag "${TAG}" \
            --latest \
            --strip header \
            --output /tmp/cliff_notes.md

          # ── Build the full GitHub Release body ────────────────────────────
          cat > /tmp/release_notes.md << MARKDOWN
          ![Platform](https://img.shields.io/badge/platform-Android-3DDC84?logo=android&logoColor=white)
          ![Version](https://img.shields.io/badge/version-${NAME}-5D52D2)
          ![License](https://img.shields.io/badge/license-MIT-blue)

          ## 🔐 Zero Password Manager ${TAG}

          A zero-knowledge, end-to-end encrypted password manager.
          Your master key never leaves your device — the server stores only encrypted blobs.

          ---

          ### 📲 Installation

          1. Download **\`zero-password-manager-${TAG}.apk\`** below
          2. On your Android device: **Settings → Security → Install unknown apps** → allow your browser/Files app
          3. Open the downloaded APK and tap **Install**
          4. Launch the app and connect to your self-hosted server

          > **Minimum Android version:** 8.0 (API 26)

          ---

          MARKDOWN

          # Append the git-cliff section (already has its own ### headings)
          cat /tmp/cliff_notes.md >> /tmp/release_notes.md

          echo "--- Release notes preview ---"
          cat /tmp/release_notes.md

      - name: Update CHANGELOG.md
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          git cliff --config cliff.toml --tag "${TAG}" --prepend CHANGELOG.md
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md pubspec.yaml
          git commit -m "chore(release): ${TAG} [skip ci]" || echo "Nothing to commit"
          # Push to the default branch (main); tolerate failure if branch-protected
          git push origin HEAD:main || echo "Push to main skipped (branch protection or nothing new)"

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "🔐 Zero Password Manager ${{ steps.ver.outputs.tag }}"
          draft: false
          prerelease: >-
            ${{ contains(steps.ver.outputs.tag, 'beta') ||
                contains(steps.ver.outputs.tag, 'alpha') ||
                contains(steps.ver.outputs.tag, 'rc') }}
          body_path: /tmp/release_notes.md
          files: |
            build/app/outputs/flutter-apk/zero-password-manager-${{ steps.ver.outputs.tag }}.apk
